<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>💬 WeChat Style · Private Room</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 8px;
    }
    .phone {
      width: 100%;
      max-width: 420px;
      height: 700px;
      height: 100dvh;
      max-height: 800px;
      background: #fff;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid #e9edef;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
    }
    .header h2 { font-weight: 600; font-size: 1.2rem; color: #111; }
    .status {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 20px;
      color: #5f6368;
    }
    .leave-btn {
      background: none;
      border: 1px solid #e9edef;
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 20px;
      color: #ea4335;
      cursor: pointer;
      font-weight: 500;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      background: #e5ddd5;
      display: flex;
      flex-direction: column;
    }
    .msg-row { display: flex; margin-bottom: 8px; }
    .msg-row.self { justify-content: flex-end; }
    .msg-row.system { justify-content: center; }
    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.4;
      word-wrap: break-word;
      background: #ffffff;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .self .bubble { background: #d9fdd3; border-top-right-radius: 4px; }
    .other .bubble { border-top-left-radius: 4px; }
    .system .bubble {
      background: #ffe8c7;
      color: #5f5f5f;
      font-size: 0.8rem;
      padding: 6px 12px;
      border-radius: 20px;
      max-width: 90%;
      text-align: center;
    }
    .input-area {
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #e9edef;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: none;
      background: #f0f2f5;
      border-radius: 24px;
      font-size: 0.95rem;
      outline: none;
    }
    .input-area button {
      background: none;
      border: none;
      color: #54656f;
      font-size: 1.5rem;
      cursor: pointer;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.1s;
    }
    .input-area button:active { background: #e9edef; }
    .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
    .setup-panel {
      padding: 30px 24px;
      text-align: center;
      background: #fff;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .setup-panel input {
      width: 100%;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 16px;
      font-size: 1rem;
      margin: 16px 0;
      text-align: center;
    }
    .setup-panel button {
      background: #0084ff;
      color: white;
      border: none;
      padding: 16px;
      border-radius: 30px;
      font-weight: 500;
      font-size: 1.1rem;
      cursor: pointer;
    }
    .note { margin-top: 20px; color: #8696a0; font-size: 0.8rem; }
    .typing-indicator {
      font-size: 0.75rem;
      color: #667781;
      margin-left: 8px;
      margin-bottom: 4px;
      min-height: 18px;
    }
    .error-toast {
      background: #ea4335;
      color: white;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      animation: fadeInOut 3s forwards;
    }
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translate(-50%, 10px); }
      10% { opacity: 1; transform: translate(-50%, 0); }
      90% { opacity: 1; transform: translate(-50%, 0); }
      100% { opacity: 0; transform: translate(-50%, -10px); }
    }
  </style>
  <!-- Firebase Compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
<div class="phone">
  <div class="header">
    <h2>💬 Secret Chat</h2>
    <div style="display: flex; gap: 8px; align-items: center;">
      <span class="status" id="connStatus">⚪ Setup</span>
      <button class="leave-btn" id="leaveBtn" style="display: none;">Leave</button>
    </div>
  </div>

  <!-- Chat Panel -->
  <div id="chatPanel" style="display: none; flex:1; flex-direction:column; position: relative;">
    <div class="messages" id="messageContainer"></div>
    <div id="typingIndicator" class="typing-indicator"></div>
    <div class="input-area">
      <input type="text" id="msgInput" placeholder="Message" autocomplete="off" disabled>
      <button id="sendBtn" disabled>➤</button>
    </div>
  </div>

  <!-- Setup Panel -->
  <div id="setupPanel" class="setup-panel">
    <h3>👥 Join a Room</h3>
    <p style="color:#54656f;">Enter the same room name to connect (2 people max)</p>
    <input type="text" id="roomInput" placeholder="e.g. coffeetalk" value="coffeetalk" maxlength="30">
    <button id="joinBtn">✨ Join Room</button>
    <p class="note">🔒 Private · Firebase backend · 2 person only</p>
  </div>
</div>

<script>
  // ========== YOUR FIREBASE CONFIGURATION ==========
  const firebaseConfig = {
    apiKey: "AIzaSyAZKZ3csVRjenMnFW9n4EqMHcSbRfQUEOk",
    authDomain: "tanmayy-45c42.firebaseapp.com",
    databaseURL: "https://tanmayy-45c42-default-rtdb.firebaseio.com",
    projectId: "tanmayy-45c42",
    storageBucket: "tanmayy-45c42.firebasestorage.app",
    messagingSenderId: "975339988066",
    appId: "1:975339988066:web:a3adf00dc6c4963b841d3b"
  };
  // =================================================

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  // ----- Persistent User ID (fixes message alignment after reload) -----
  const STORAGE_KEY = 'chat_user_id';
  let userId = localStorage.getItem(STORAGE_KEY);
  if (!userId) {
    userId = 'user-' + Math.random().toString(36).substr(2, 6);
    localStorage.setItem(STORAGE_KEY, userId);
  }

  // ----- State -----
  let currentRoom = null;
  let partnerConnected = false;
  let messagesRef = null;
  let presenceRef = null;
  let typingRef = null;
  let roomPresenceRef = null;
  let typingListenerRef = null;
  let messagesListenerRef = null;
  let connectedRef = null;
  let partnerId = null;
  let systemMessageShownForWaiting = false;
  let messageLimitQuery = null;

  // UI Elements
  const statusEl = document.getElementById('connStatus');
  const setupPanel = document.getElementById('setupPanel');
  const chatPanel = document.getElementById('chatPanel');
  const msgContainer = document.getElementById('messageContainer');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const roomInput = document.getElementById('roomInput');
  const joinBtn = document.getElementById('joinBtn');
  const typingIndicator = document.getElementById('typingIndicator');
  const leaveBtn = document.getElementById('leaveBtn');

  // Helper: Show temporary error toast
  function showErrorToast(message) {
    const toast = document.createElement('div');
    toast.className = 'error-toast';
    toast.textContent = message;
    chatPanel.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // Helper: Add message to UI
  function addMessage(text, senderId, isSelf, isSystem = false) {
    const row = document.createElement('div');
    if (isSystem) {
      row.className = 'msg-row system';
    } else {
      row.className = `msg-row ${isSelf ? 'self' : 'other'}`;
    }
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    row.appendChild(bubble);
    msgContainer.appendChild(row);
    msgContainer.scrollTop = msgContainer.scrollHeight;
  }

  // Update connection status
  function setStatus(text, bgColor = '#f1f3f4') {
    statusEl.textContent = text;
    statusEl.style.background = bgColor;
  }

  // Enable/disable input
  function setInputEnabled(enabled) {
    msgInput.disabled = !enabled;
    sendBtn.disabled = !enabled;
  }

  // ----- Clean up all Firebase listeners -----
  function cleanupListeners() {
    if (presenceRef) presenceRef.remove();
    if (typingRef) typingRef.remove();
    if (roomPresenceRef) roomPresenceRef.off();
    if (messagesListenerRef && messagesRef) messagesRef.off('child_added', messagesListenerRef);
    if (typingListenerRef) typingListenerRef.off();
    if (connectedRef) connectedRef.off();
    presenceRef = typingRef = roomPresenceRef = messagesListenerRef = typingListenerRef = connectedRef = null;
  }

  // Leave room and go back to setup
  function leaveRoom() {
    if (!currentRoom) return;

    cleanupListeners();

    // Clear UI
    msgContainer.innerHTML = '';
    typingIndicator.textContent = '';

    // Reset state
    currentRoom = null;
    partnerConnected = false;
    partnerId = null;
    systemMessageShownForWaiting = false;

    // Switch panels
    chatPanel.style.display = 'none';
    setupPanel.style.display = 'flex';
    leaveBtn.style.display = 'none';
    setStatus('⚪ Setup', '#f1f3f4');
    setInputEnabled(false);
  }

  // Show chat UI
  function showChatUI() {
    setupPanel.style.display = 'none';
    chatPanel.style.display = 'flex';
    leaveBtn.style.display = 'block';
  }

  // Sanitize room name
  function sanitizeRoomName(name) {
    return name.trim().replace(/[.#$[\]]/g, '_').substring(0, 30);
  }

  // Send message
  function sendMessage() {
    const msg = msgInput.value.trim();
    if (!msg || !currentRoom || !partnerConnected) return;

    const messageData = {
      text: msg,
      sender: userId,
      timestamp: firebase.database.ServerValue.TIMESTAMP
    };

    messagesRef.push(messageData).catch(err => {
      showErrorToast('Failed to send. Check connection.');
      console.error(err);
    });

    msgInput.value = '';
    typingRef.set(false);
  }

  // ----- Typing handling -----
  let typingTimeout;
  msgInput.addEventListener('input', () => {
    if (!currentRoom || !partnerConnected) return;
    typingRef.set(true);
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => typingRef.set(false), 1000);
  });

  // Join a room
  function joinRoom(roomName) {
    const sanitized = sanitizeRoomName(roomName);
    if (!sanitized) return alert('Please enter a valid room name');

    // Cleanup any previous room
    if (currentRoom) {
      cleanupListeners();
    }

    currentRoom = sanitized;
    const roomPath = `rooms/${currentRoom}`;
    messagesRef = database.ref(`${roomPath}/messages`);
    messageLimitQuery = messagesRef.limitToLast(100);
    presenceRef = database.ref(`${roomPath}/presence/${userId}`);
    typingRef = database.ref(`${roomPath}/typing/${userId}`);
    roomPresenceRef = database.ref(`${roomPath}/presence`);

    setStatus('🟡 Connecting...', '#fff3cd');
    msgContainer.innerHTML = '';
    systemMessageShownForWaiting = false;
    partnerConnected = false;
    setInputEnabled(false);

    // Set up connection monitoring
    connectedRef = database.ref('.info/connected');
    connectedRef.on('value', (snap) => {
      if (snap.val() === true) {
        presenceRef.set(true);
        presenceRef.onDisconnect().remove();
        typingRef.onDisconnect().remove();
      }
    });

    // Listen for partner presence (max 2 users)
    roomPresenceRef.on('value', (snap) => {
      const users = snap.val() || {};
      const otherUsers = Object.keys(users).filter(id => id !== userId);
      const totalUsers = Object.keys(users).length;

      // Enforce 2‑person limit
      if (totalUsers > 2) {
        addMessage('❌ Room is full (max 2 people). Disconnecting...', 'system', false, true);
        setStatus('🔴 Room full', '#f8d7da');
        setTimeout(() => leaveRoom(), 1500);
        return;
      }

      const wasConnected = partnerConnected;
      partnerConnected = otherUsers.length > 0;
      partnerId = otherUsers[0] || null;

      if (partnerConnected) {
        setStatus('🟢 Partner online', '#d9fdd3');
        setInputEnabled(true);
        if (!wasConnected) {
          addMessage('✨ Partner joined the chat', 'system', false, true);
        }
        showChatUI();
      } else {
        setStatus('🟡 Waiting for partner...', '#fff3cd');
        setInputEnabled(false);
        if (!systemMessageShownForWaiting) {
          addMessage('⏳ Waiting for partner to join...', 'system', false, true);
          systemMessageShownForWaiting = true;
        }
        showChatUI();
      }
    });

    // Listen for partner typing (exclude self)
    const allTypingRef = database.ref(`${roomPath}/typing`);
    typingListenerRef = allTypingRef.on('value', (snap) => {
      const typingUsers = snap.val() || {};
      const isPartnerTyping = Object.entries(typingUsers).some(
        ([id, val]) => id !== userId && val === true
      );
      typingIndicator.textContent = isPartnerTyping ? '✍️ Partner is typing...' : '';
    });

    // Listen for new messages
    messagesListenerRef = messageLimitQuery.on('child_added', (snap) => {
      const msg = snap.val();
      const isSelf = msg.sender === userId;
      addMessage(msg.text, msg.sender, isSelf, false);
    });

    showChatUI();
  }

  // Event listeners
  joinBtn.addEventListener('click', () => joinRoom(roomInput.value.trim()));
  roomInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') joinRoom(roomInput.value.trim());
  });
  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
  leaveBtn.addEventListener('click', leaveRoom);

  // Cleanup on page unload
  window.addEventListener('beforeunload', () => {
    if (presenceRef) presenceRef.remove();
    if (typingRef) typingRef.remove();
  });

  // Pre-fill random room suffix for demo
  roomInput.value = 'coffeetalk' + Math.floor(Math.random() * 100);
</script>
</body>
</html>
